# Supabase config — applies to local dev (`supabase start`).
#
# Production config (Auth providers, Custom JWT JWKS, etc.) lives en el
# dashboard. Este file solo controla el local stack que `supabase start`
# levanta para dev/testing.
#
# Ver https://supabase.com/docs/guides/cli/config para todos los keys.

project_id = "moneto"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = false
file_size_limit = "5MiB"

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = ["exp://"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false
enable_anonymous_sign_ins = false

# IMPORTANTE: en producción, este JWT secret se reemplaza con la
# integration de Privy via Custom JWT JWKS URL desde el dashboard.
# Local dev usa el secret default de Supabase para que `supabase start`
# funcione sin el bridge de Privy. Las edge functions validan el JWT
# de Privy directo (con jose + JWKS), no dependen de este secret.

[auth.email]
enable_signup = false
enable_confirmations = false
double_confirm_changes = false

[auth.sms]
enable_signup = false

[edge_runtime]
enabled = true
inspector_port = 8083
policy = "oneshot"

[functions.sync-profile]
verify_jwt = false
# Validamos el JWT de Privy nosotros mismos en el handler (jose + JWKS).
# Supabase no puede validar JWTs de Privy automáticamente — diferente issuer.

[functions.auth-exchange]
verify_jwt = false
# Recibe Privy JWT (no Supabase). Validamos manual + minteamos Supabase JWT
# firmado con SUPABASE_JWT_SECRET para que mobile lo use en queries directas.
