name = "moneto-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# --- Environments -----------------------------------------------------------
# Vars y secrets se inyectan vía `wrangler secret put` por env. Nada commiteado.
# Bindings (D1, KV, R2, Queues) se añaden en el sprint que los necesite.

[observability]
enabled = true

[env.staging]
name = "moneto-api-staging"

[env.production]
name = "moneto-api"
