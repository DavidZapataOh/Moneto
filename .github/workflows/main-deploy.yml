name: Deploy on main

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-api-staging:
    name: API → staging (Cloudflare Workers)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
      url: https://api-staging.moneto.xyz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (gate)
        run: pnpm --filter @moneto/api typecheck

      - name: Deploy
        run: pnpm --filter @moneto/api exec wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test /health
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf https://api-staging.moneto.xyz/health; then
              echo "✓ /health responding"
              exit 0
            fi
            echo "attempt $i: not yet, waiting 5s..."
            sleep 5
          done
          echo "✗ /health did not respond after 25s"
          exit 1

  deploy-mobile-ota-staging:
    name: Mobile OTA → staging (EAS Update)
    runs-on: ubuntu-latest
    needs: deploy-api-staging
    timeout-minutes: 15
    environment:
      name: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update to staging channel
        run: |
          cd apps/mobile && \
          eas update --branch staging --message "${{ github.event.head_commit.message || format('Manual deploy {0}', github.sha) }}"

  deploy-web-staging:
    name: Web → staging (Vercel)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: staging
      url: https://staging.moneto.xyz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @moneto/web build

      - name: Deploy to Vercel (staging)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: |
          npx vercel pull --yes --environment=preview --token=$VERCEL_TOKEN --cwd apps/web
          npx vercel build --token=$VERCEL_TOKEN --cwd apps/web
          npx vercel deploy --prebuilt --token=$VERCEL_TOKEN --cwd apps/web
