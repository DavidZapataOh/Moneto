name: Production release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v0.1.0)"
        required: true
        type: string
      release_notes:
        description: "Release notes (markdown)"
        required: true
        type: string
      skip_mobile:
        description: "Skip mobile OTA (only API/web)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-production
  cancel-in-progress: false

jobs:
  validate:
    name: Pre-release validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  release-api:
    name: API → production (Cloudflare Workers)
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10
    environment:
      name: production
      url: https://api.moneto.xyz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy
        run: pnpm --filter @moneto/api exec wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test /health
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf https://api.moneto.xyz/health; then
              echo "✓ /health responding"
              exit 0
            fi
            echo "attempt $i: not yet, waiting 5s..."
            sleep 5
          done
          echo "✗ /health did not respond after 25s — investigate before mobile/web release"
          exit 1

  release-mobile:
    name: Mobile OTA → production (EAS Update)
    runs-on: ubuntu-latest
    needs: release-api
    if: ${{ !inputs.skip_mobile }}
    timeout-minutes: 15
    environment:
      name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish OTA update to production channel
        run: |
          cd apps/mobile && \
          eas update --branch production --message "${{ inputs.version }} — ${{ inputs.release_notes }}"

  release-web:
    name: Web → production (Vercel)
    runs-on: ubuntu-latest
    needs: release-api
    timeout-minutes: 10
    environment:
      name: production
      url: https://moneto.xyz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Vercel (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: |
          npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN --cwd apps/web
          npx vercel build --prod --token=$VERCEL_TOKEN --cwd apps/web
          npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN --cwd apps/web

  tag-release:
    name: Tag + GitHub release
    runs-on: ubuntu-latest
    needs: [release-api, release-mobile, release-web]
    if: always() && needs.release-api.result == 'success' && needs.release-web.result == 'success'
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          body: ${{ inputs.release_notes }}
          generate_release_notes: false
